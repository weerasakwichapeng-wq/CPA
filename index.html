<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSC ตรวจสอบย้อนกลับ - เถ้าแก่น้อยยางพารา</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🌳</div>
      <div>
        <h1>บริษัท เจริญโภคภัณฑ์การเกษตรกร จำกัด</h1>
        <div class="subtitle">ระบบตรวจสอบย้อนกลับยางพารายั่งยืน</div>
      </div>
    </div>
    <nav class="mainnav">
      <a href="#/dashboard" data-route="dashboard" data-requires-role="viewer">📊 แดชบอร์ด</a>
      <a href="#/map" data-route="map" data-requires-role="viewer">🗺️ แผนที่ดาวเทียม</a>
      <a href="#/trace" data-route="trace" data-requires-role="viewer">🔍 ตรวจสอบย้อนกลับ</a>
      <a href="#/farmers" data-route="farmers" data-requires-role="manager">👥 เกษตรกร</a>
      <a href="#/lots" data-route="lots" data-requires-role="manager">📦 ล็อตรับซื้อ</a>
      <a href="#/report" data-route="report" data-requires-role="manager">📋 สร้างแผนที่รายงาน</a>
      <a href="#/add" data-route="add" data-requires-role="manager">➕ บันทึกข้อมูลใหม่</a>
      <a href="#/users" data-route="users" data-requires-role="admin">👤 จัดการบัญชี</a>
    </nav>
    <div class="user-chip" id="userChip"></div>
  </header>

  <main id="view"></main>

  <footer class="footer">
    <span>ระบบจัดการข้อมูล FSC · ข้อมูล <span id="dataCount"></span></span>
    <span>© 2026 เถ้าแก่น้อยยางพารา</span>
  </footer>

  <!-- Templates -->
  <template id="tpl-dashboard">
    <div class="page">
      <h2>แดชบอร์ดข้อมูลรวม</h2>
      <div class="stat-grid">
        <div class="stat-card stat-blue">
          <div class="stat-num" id="statMembers">-</div>
          <div class="stat-label">สมาชิก/แปลง</div>
        </div>
        <div class="stat-card stat-green">
          <div class="stat-num" id="statFMU">-</div>
          <div class="stat-label">FMU (หน่วยจัดการ)</div>
        </div>
        <div class="stat-card stat-orange">
          <div class="stat-num" id="statArea">-</div>
          <div class="stat-label">พื้นที่รวม (ไร่)</div>
        </div>
        <div class="stat-card stat-cyan">
          <div class="stat-num" id="statWater">-</div>
          <div class="stat-label">🔵 แหล่งน้ำ</div>
        </div>
        <div class="stat-card stat-purple">
          <div class="stat-num" id="statDocs">-</div>
          <div class="stat-label">📄 เอกสารสิทธิ์</div>
        </div>
      </div>


      <section class="panel panel-quota highlight-panel">
        <div class="panel-head">
          <h3>💰 ผลผลิตยางแห้งที่ซื้อได้ต่อปี</h3>
        </div>
        <div class="quota-grid" id="annualYieldStats"></div>
      </section>

      <div class="dash-grid-12">
        <!-- Row 1: 4 compact donut charts (small multiples) -->
        <section class="panel col-3 donut-panel">
          <div class="chart-head"><h3>เพศ</h3><span class="chart-sub">Gender</span></div>
          <div id="genderChart"></div>
        </section>
        <section class="panel col-3 donut-panel">
          <div class="chart-head"><h3>การจัดการแปลง</h3><span class="chart-sub">Management</span></div>
          <div id="managementChart"></div>
        </section>
        <section class="panel col-3 donut-panel">
          <div class="chart-head"><h3>สายพันธุ์ยางพารา</h3><span class="chart-sub">Species</span></div>
          <div id="speciesChart"></div>
        </section>
        <section class="panel col-3 donut-panel">
          <div class="chart-head"><h3>พื้นที่ตามอำเภอ</h3><span class="chart-sub">District</span></div>
          <div id="districtChart"></div>
        </section>

        <!-- Row 2: Two medium horizontal-bar charts -->
        <section class="panel col-6">
          <div class="chart-head"><h3>ระบบแบ่งกรีด</h3><span class="chart-sub">Tapping contract</span></div>
          <div id="contractChart" class="bar-chart"></div>
        </section>
        <section class="panel col-6">
          <div class="chart-head"><h3>ประเภทเอกสารสิทธิ์</h3><span class="chart-sub">Land title type</span></div>
          <div id="docTypeChart" class="bar-chart"></div>
        </section>

        <!-- Row 2.5: Land titles per subdistrict -->
        <section class="panel col-12">
          <div class="chart-head"><h3>📄 เอกสารสิทธิ์ต่อตำบล แยกตามประเภท</h3><span class="chart-sub">Land titles by subdistrict &amp; type · นับไม่ซ้ำ</span></div>
          <div id="docPerSubdistrictChart"></div>
        </section>

        <!-- Row 3: Stacked bar (full width) + HUB donut -->
        <section class="panel col-8">
          <div class="chart-head"><h3>องค์ประกอบพื้นที่ทั้งหมด</h3><span class="chart-sub">Land use composition</span></div>
          <div id="areaTypeChart"></div>
        </section>
        <section class="panel col-4 donut-panel">
          <div class="chart-head"><h3>HUB รับซื้อยาง</h3><span class="chart-sub">Annual cup lump</span></div>
          <div id="hubChart"></div>
        </section>

        <!-- Wood plan 5yr + 25yr -->
        <section class="panel col-12 wood-plan-panel">
          <div class="chart-head">
            <h3>🌳 แผนการทำไม้</h3>
            <span class="chart-sub">Timber Harvesting Plan · อ้างอิงปีตัดโค่นจริง (cutBEActual)</span>
          </div>
          <div class="wood-plan-layout">
            <div id="woodPlan5yr" class="wood-5yr-wrap"></div>
            <div id="woodPlan25yr" class="wood-25yr-wrap"></div>
          </div>
        </section>

        <!-- Row 4: Recent activity table -->
        <section class="panel col-12">
          <div class="chart-head"><h3>กิจกรรมล่าสุด</h3><span class="chart-sub">Recent plot updates</span></div>
          <table class="data-table" id="recentTable">
            <thead><tr><th>FMU</th><th>ชื่อ-สกุล</th><th>พื้นที่ (ไร่)</th><th>สายพันธุ์</th><th>ตำบล/อำเภอ</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </section>
      </div>
    </div>
  </template>

  <template id="tpl-farmers">
    <div class="page">
      <div class="page-header">
        <div>
          <h2>รายชื่อเกษตรกร / แปลงปลูก</h2>
          <p class="page-sub">Members & Plots</p>
        </div>
        <span class="count-badge" id="resultCount"></span>
      </div>
      <div class="toolbar">
        <input type="search" id="searchInput" placeholder="🔍 ค้นหา ชื่อ, FMU, รหัสสมาชิก, เลขเอกสาร, ตำบล...">
        <select id="filterFMU"><option value="">ทุก FMU</option></select>
        <select id="filterDocType"><option value="">ทุกประเภทเอกสาร</option></select>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="farmersTable">
          <thead>
            <tr>
              <th>#</th><th>RMU</th><th>FMU</th><th>แปลง</th><th>ชื่อ-สกุล</th><th>เบอร์โทร</th>
              <th>เอกสารสิทธิ์</th><th>เลขที่</th><th>พื้นที่ (ไร่)</th><th>สายพันธุ์</th><th>ตำบล</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </template>

  <template id="tpl-farmer-detail">
    <div class="page">
      <div class="detail-topbar">
        <a href="#/farmers" class="back-link">← กลับรายชื่อ</a>
        <div class="actions-bar">
          <button class="btn btn-primary" id="reportBtn">📋 สร้างแผนที่รายแปลง</button>
          <button class="btn btn-fsc" id="complianceBtn">📑 รายงาน FSC Compliance</button>
          <button class="btn" id="editBtn">✏️ แก้ไขข้อมูล</button>
          <button class="btn btn-secondary" id="printBtn">🖨️ พิมพ์</button>
        </div>
      </div>

      <div class="detail-header">
        <div>
          <h2 id="dNameTh"></h2>
          <div class="muted" id="dNameEn"></div>
        </div>
        <div class="badges">
          <span class="badge" id="dFmu"></span>
          <span class="badge badge-blue" id="dPlot"></span>
        </div>
      </div>

      <div class="dash-grid-12">
        <!-- Row 0: Quota highlight at top -->
        <section class="panel panel-quota col-12">
          <div class="panel-head">
            <h3>📊 โควต้าขายผลผลิต</h3>
            <button class="btn btn-small btn-secondary" id="editQuotaBtn">✏️ แก้ไขโควต้า</button>
          </div>
          <div class="quota-grid" id="quotaView"></div>
          <form class="quota-form" id="quotaForm" style="display:none">
            <label>ผลผลิตต่อไร่ (กก./ไร่/ปี)
              <input type="number" name="yieldPerRai" step="0.01" placeholder="เช่น 280">
            </label>
            <label>ปริมาณส่งยางได้ต่อรอบ (กก.)
              <input type="number" name="deliveryPerRound" step="0.01" placeholder="เช่น 1500">
            </label>
            <label>จำนวนกระสอบที่ได้รับ (ใบ)
              <input type="number" name="sacksReceived" step="1" placeholder="เช่น 30">
            </label>
            <label>ราคารับซื้อ (บาท/กก.)
              <input type="number" name="pricePerKg" step="0.01" placeholder="เช่น 65.50">
            </label>
            <label>รอบส่งล่าสุด (วันที่)
              <input type="date" name="lastDeliveryDate">
            </label>
            <label>หมายเหตุ
              <input type="text" name="quotaNote" placeholder="เช่น ส่งทุก 15 วัน">
            </label>
            <div class="quota-actions">
              <button type="submit" class="btn btn-primary">💾 บันทึก</button>
              <button type="button" class="btn" id="cancelQuotaBtn">ยกเลิก</button>
            </div>
          </form>
        </section>

        <!-- Row 1: 3 info panels equal width -->
        <section class="panel col-4">
          <div class="chart-head"><h3>ข้อมูลส่วนตัว</h3><span class="chart-sub">Personal</span></div>
          <dl class="kv" id="kvPersonal"></dl>
        </section>
        <section class="panel col-4">
          <div class="chart-head"><h3>ข้อมูลแปลง</h3><span class="chart-sub">Plot</span></div>
          <dl class="kv" id="kvPlot"></dl>
        </section>
        <section class="panel col-4">
          <div class="chart-head"><h3>การจัดการ & ผู้รับผิดชอบ</h3><span class="chart-sub">Management</span></div>
          <dl class="kv" id="kvMgmt"></dl>
        </section>

        <!-- Row 2: Doc info + Chemicals -->
        <section class="panel col-6">
          <div class="chart-head"><h3>เอกสารสิทธิ์ (ข้อมูล)</h3><span class="chart-sub">Land title info</span></div>
          <dl class="kv" id="kvDoc"></dl>
          <div id="docFiles"></div>
        </section>
        <section class="panel col-6">
          <div class="chart-head"><h3>🧪 การใช้สารเคมี</h3><span class="chart-sub">Chemicals</span></div>
          <dl class="kv" id="kvChem"></dl>
        </section>

        <!-- Row 3: Wood plan -->
        <section class="panel col-12">
          <div class="chart-head"><h3>🌳 แผนทำไม้ 25 ปี</h3><span class="chart-sub">Wood plan</span></div>
          <dl class="kv kv-grid" id="kvWood"></dl>
        </section>

        <!-- Row 4: Application documents (เอกสารการสมัคร) — full width on top -->
        <section class="panel panel-application col-12" id="panelApplication" style="display:none">
          <div class="panel-head">
            <h3>📝 เอกสารการสมัคร</h3>
            <span class="app-fmu-tag" id="appFmuTag"></span>
          </div>
          <p class="muted" id="appNote"></p>
          <div class="app-doc-list" id="appDocList"></div>
        </section>

        <!-- Row 4.5: FSC supporting evidence (e.g., SPK declaration before 2537) -->
        <section class="panel panel-fsc-evidence col-12" id="panelFscEvidence" style="display:none">
          <div class="panel-head">
            <h3>📜 หลักฐานประกอบ FSC</h3>
            <span class="fsc-evidence-tag" id="fscEvidenceTag"></span>
          </div>
          <p class="muted" id="fscEvidenceNote"></p>
          <div class="fsc-evidence-list" id="fscEvidenceList"></div>
        </section>

        <!-- Row 5: Land title PDF + Tax PDF -->
        <section class="panel panel-landtitle col-6" id="panelLandTitle" style="display:none">
          <div class="panel-head">
            <h3>📄 เอกสารสิทธิ์ที่ดิน (ไฟล์)</h3>
            <span class="lt-fmu-tag" id="ltFmuTag"></span>
          </div>
          <p class="muted" id="ltNote"></p>
          <div class="lt-doc-list" id="ltDocList"></div>
          <div class="lt-user-files" id="ltUserFiles"></div>
        </section>
        <section class="panel panel-tax col-6" id="panelTax" style="display:none">
          <div class="panel-head">
            <h3>📋 เอกสารการเสียภาษีที่ดิน</h3>
            <span class="tax-fmu-tag" id="taxFmuTag"></span>
          </div>
          <p class="muted" id="taxNote"></p>
          <div class="tax-doc-list" id="taxDocList"></div>
        </section>

        <!-- Row 6: Map -->
        <section class="panel col-12">
          <div class="chart-head"><h3>🛰️ แผนที่ดาวเทียม (Polygon แปลงปลูก)</h3><span class="chart-sub">Satellite map</span></div>
          <div id="detailMap" class="detail-map"></div>
        </section>
      </div>
    </div>
  </template>

  <template id="tpl-map">
    <div class="page page-map">
      <div class="map-toolbar">
        <h2>แผนที่ภาพถ่ายดาวเทียม</h2>
        <label class="basemap-picker">
          🛰️ ภาพดาวเทียม:
          <select id="mapBasemapYear">
            <option value="current">📅 ภาพปัจจุบัน</option>
            <option value="y2536">🕰️ พ.ศ. 2536 (FSC pre-1994)</option>
          </select>
        </label>
        <label class="lyr-prod"><input type="checkbox" id="togProductive" checked> 🟩 พื้นที่ให้ผลผลิต (<span id="cntProd"></span>)</label>
        <label class="lyr-water"><input type="checkbox" id="togWater" checked> 🔵 แหล่งน้ำ (<span id="cntWater"></span>)</label>
        <label class="lyr-lt"><input type="checkbox" id="togLandTitle" checked> 🟨 เอกสารสิทธิ์ (<span id="cntLT"></span>)</label>
        <label class="lyr-buffer"><input type="checkbox" id="togBuffer" checked> 🟪 Buffer Zone (<span id="cntBuffer"></span>)</label>
        <label class="lyr-ifl"><input type="checkbox" id="togIFL"> 🟢 IFL Intact Forest <span class="lyr-year">(2025)</span></label>
        <label class="lyr-wdpa"><input type="checkbox" id="togWDPA"> 🟦 WDPA Protected <span class="lyr-year">(2026)</span></label>
        <input type="search" id="mapSearch" placeholder="🔍 ค้นหา FMU หรือชื่อ...">
        <button class="btn btn-small" id="fitAllBtn">📍 ดูทั้งหมด</button>
      </div>
      <div id="bigMap" class="big-map"></div>
    </div>
  </template>

  <template id="tpl-documents">
    <div class="page">
      <div class="page-header">
        <div>
          <h2>คลังเอกสารสิทธิ์</h2>
          <p class="page-sub">Land Title Document Archive</p>
        </div>
        <span class="count-badge" id="docCount"></span>
      </div>
      <div class="toolbar">
        <input type="search" id="docSearch" placeholder="🔍 ค้นหา เลขเอกสาร, ประเภท, ชื่อเจ้าของ...">
      </div>
      <div class="doc-list" id="docList"></div>
    </div>
  </template>

  <template id="tpl-trace">
    <div class="page">
      <div class="page-header">
        <div>
          <h2>🔍 ตรวจสอบย้อนกลับ FSC</h2>
          <p class="page-sub">FSC Traceability — ค้นหาที่มาของวัตถุดิบยางพารา</p>
        </div>
      </div>
      <section class="panel highlight-panel">
        <div class="trace-search">
          <input type="search" id="traceInput" placeholder="รหัสสมาชิก / FMU / เลขเอกสารสิทธิ์ / ชื่อเกษตรกร" autofocus>
          <button class="btn btn-primary" id="traceBtn">🔍 ตรวจสอบ</button>
        </div>
      </section>
      <div id="traceResult"></div>
    </div>
  </template>

  <template id="tpl-add">
    <div class="page">
      <div class="page-header">
        <div>
          <h2 id="addTitle">➕ บันทึกข้อมูลเกษตรกร / แปลงปลูก</h2>
          <p class="page-sub">Add / Edit Member Record</p>
        </div>
      </div>
      <p class="muted" style="margin-bottom:14px">ข้อมูลที่กรอกจะถูกบันทึกในเครื่อง (localStorage) สามารถส่งออก JSON เพื่อรวมเข้าระบบกลางได้</p>
      <form id="addForm" class="form-grid">
        <fieldset>
          <legend>ข้อมูลสมาชิก</legend>
          <label>FMU <input name="fmu" required placeholder="เช่น FMU76"></label>
          <label>รหัสแปลง <input name="plot" placeholder="เช่น FMU76-1"></label>
          <label>รหัสสมาชิก <input name="memberId"></label>
          <label>เพศ
            <select name="gender"><option>ชาย</option><option>หญิง</option></select>
          </label>
          <label>เลขบัตรประชาชน <input name="idCard"></label>
          <label>ชื่อ-สกุล (ไทย) <input name="nameTh" required></label>
          <label>Name (English) <input name="nameEn"></label>
          <label>เบอร์โทร <input name="phone"></label>
          <label>อายุ <input name="age" type="number"></label>
          <label>เลขทะเบียนเกษตรกรชาวสวนยาง <input name="rubberRegNo"></label>
        </fieldset>

        <fieldset>
          <legend>เอกสารสิทธิ์</legend>
          <label>ประเภทเอกสาร
            <select name="docType">
              <option value="">-</option>
              <option>น.ส.4 จ.</option><option>น.ส.3 ก.</option><option>น.ส.3</option>
              <option>ส.ป.ก. 4-01</option><option>ก.ส.น.3</option><option>ก.ส.น.5</option><option>อื่นๆ</option>
            </select>
          </label>
          <label>เลขที่เอกสาร <input name="docNo"></label>
          <label>ชื่อเจ้าของเอกสารสิทธิ์ <input name="docOwnerTh"></label>
          <label>ความสัมพันธ์ <input name="relation" placeholder="เจ้าของสวนยาง / ภรรยา / ฯลฯ"></label>
          <label>การชำระภาษีที่ดิน
            <select name="taxStatus"><option value="">-</option><option>ชำระแล้ว</option><option>ได้รับการยกเว้น</option><option>ค้างชำระ</option></select>
          </label>
          <label class="file-label">📎 แนบไฟล์เอกสารสิทธิ์ (PDF/รูป)
            <input name="docFile" type="file" accept="image/*,application/pdf">
          </label>
        </fieldset>

        <fieldset>
          <legend>ข้อมูลแปลงปลูก</legend>
          <label>ไร่ <input name="rai" type="number" step="0.01"></label>
          <label>งาน <input name="ngan" type="number" step="0.01"></label>
          <label>ตร.วา <input name="sqWah" type="number" step="0.01"></label>
          <label>พื้นที่รวม (ไร่) <input name="areaRai" type="number" step="0.01"></label>
          <label>พ.ศ.ที่ปลูก <input name="plantBE" type="number"></label>
          <label>อายุยาง (ปี) <input name="rubberAge" type="number"></label>
          <label>ระยะปลูก <input name="spacing" placeholder="เช่น 3X7"></label>
          <label>สายพันธุ์
            <input name="species" list="speciesList" placeholder="เช่น RRIM600">
            <datalist id="speciesList">
              <option value="RRIM600"><option value="RRIT251"><option value="JVP80">
            </datalist>
          </label>
          <label>หมู่ที่ <input name="moo"></label>
          <label>ชื่อหมู่บ้าน <input name="village"></label>
          <label>ตำบล <input name="subdistrict"></label>
